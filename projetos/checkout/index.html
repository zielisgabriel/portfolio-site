<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="checkout-container">
            <div class="endereco-de-cobranca">
                <h2>ENDEREÇO DE COBRANÇA:</h2>
                <div class="nome">
                    <p>Nome Completo:</p>
                    <input type="text" name="" id="Nome" placeholder="Ex: José Afonso da Silva">
                </div>
                <div class="email">
                    <p>Email:</p>
                    <input type="email" name="" id="Email" placeholder="Ex: abcde123@gmail.com">
                </div>
                <div class="endereco">
                    <p>Endereço:</p>
                    <input type="text" name="" id="Endereço" placeholder="Ex: Rua Gustavo Barroso">
                </div>
                <div class="cidade-numero">
                    <div class="cidade">
                        <p>Cidade:</p>
                        <input type="text" name="" id="Cidade" placeholder="Ex: Fortaleza">
                    </div>
                    <div class="numero">
                        <p>Número:</p>
                        <input type="text" name="" id="Número" placeholder="Ex: 123">
                    </div>
                </div>
                <div class="estado-cep">
                    <div class="estado">
                        <p>Estado:</p>
                        <input type="text" name="" id="Estado" placeholder="Ex: Ceará">
                    </div>
                    <div class="cep">
                        <p>CEP:</p>
                        <input type="text" name="" id="CEP" placeholder="Ex: 12345-789">
                    </div>
                </div>
            </div>
            <div class="pagamento">
                <h2>PAGAMENTO:</h2>
                <div class="cartoes-container">
                    <p>Cartões Utilizados:</p>
                    <div class="cartoes">
                        <img src="img/cartoes/mastercard.png" alt="Matercard">
                        <img src="img/cartoes/visa.png" alt="Visa">
                        <img src="img/cartoes/american-express.png" alt="American Express">
                    </div>
                </div>
                <div class="nome-no-cartao">
                    <p>Nome no Cartão:</p>
                    <input type="text" name="" id="Nome no Cartão" placeholder="Ex: José Afonso da Silva">
                </div>
                <div class="numero-do-cartao">
                    <p>Número do Cartão:</p>
                    <input type="text" name="" id="Número do Cartão" placeholder="Ex: 1234 5678 9123 4567">
                </div>
                <div class="exp-mes">
                    <p>Exp. Mês:</p>
                    <input type="text" name="" id="Exp. Mês" placeholder="Ex: Março">
                </div>
                <div class="expano-cvv">
                    <div class="exp-ano">
                        <p>Exp. Ano:</p>
                        <input type="text" name="" id="Exp. Ano" placeholder="Ex: 2029">
                    </div>
                    <div class="cvv">
                        <p>CVV:</p>
                        <input type="text" name="" id="CVV" placeholder="Ex: 123">
                    </div>
                </div>
            </div>
        </div>
        <div class="text">
            <div class="checkout-text">
                <h1>Projeto<br>Checkout.</h1>
            </div>
        </div>
    </div>
</body>
</html>
