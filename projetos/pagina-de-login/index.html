<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="frase">
            <h1>Faça o seu login!<br><h2>Em nossa plataforma</h2></h1>
        </div>
        <div class="login-container">
            <div class="login-texto">
                <h1>Login</h1>
            </div>
            <div class="email-senha-container">
                <div class="email-senha">
                    <input type="text" placeholder="Email" autocomplete="off" required>
                </div>
                <div class="email-senha">
                    <input type="password" placeholder="Senha" autocomplete="off" required>
                </div>
                <div class="lembrar-div">
                    <div class="lembrar">
                        <input type="checkbox" id="check"><p>Lembrar</p>
                    </div>
                </div>
            </div>
            <div class="cadastrar-esqueci-container">
                <div class="cadastrar-link">
                    <a href="#"><h2>Cadastra-se</h2></a>
                </div>
                <div class="esqueci-link">
                    <a href="#"><p>Esqueci minha senha</p></a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
